server:
  port: 8080

spring:
  application:
    name: ruoyi-gateway
  profiles:
    active: dev
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: ruoyi-auth
          uri: lb://ruoyi-auth
          predicates:
            - Path=/auth/**
          filters:
            - StripPrefix=1

        - id: ruoyi-system
          uri: lb://ruoyi-system
          predicates:
            - Path=/system/**
          filters:
            - StripPrefix=1

        - id: ruoyi-gen
          uri: lb://ruoyi-gen
          predicates:
            - Path=/code/**
          filters:
            - StripPrefix=0

        - id: ruoyi-job
          uri: lb://ruoyi-job
          predicates:
            - Path=/job/**
          filters:
            - StripPrefix=1

        - id: ruoyi-file
          uri: lb://ruoyi-file
          predicates:
            - Path=/file/**
          filters:
            - StripPrefix=1

        - id: ruoyi-api
          uri: lb://ruoyi-api
          predicates:
            - Path=/api/**
          filters:
            - StripPrefix=1

# 管理端点配置
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    gateway:
      enabled: true
    health:
      enabled: true
    info:
      enabled: true